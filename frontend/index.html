<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Contract Quest</title>
  <style>
    :root { color-scheme: dark; --bg:#101624; --fg:#f8f4dd; --gold:#ffd166; --ok:#68d391; }
    html, body { margin:0; height:100%; overflow:hidden; background:linear-gradient(#101624,#24304a); color:var(--fg); font-family:Inter,system-ui,sans-serif; }
    #game { display:block; width:100vw; height:100vh; image-rendering:pixelated; touch-action:none; }
    #hud { position:fixed; top:12px; left:12px; display:flex; gap:10px; flex-wrap:wrap; font-weight:700; text-shadow:0 2px 3px #000; }
    #hud span { background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.25); border-radius:999px; padding:6px 10px; }
    #panel { position:fixed; right:12px; bottom:12px; max-width:390px; background:rgba(9,14,24,.78); border:1px solid rgba(255,255,255,.22); border-radius:14px; padding:12px; line-height:1.35; }
    #touch { position:fixed; inset:auto 0 20px 0; pointer-events:none; display:flex; justify-content:space-between; padding:0 22px; }
    #touch button { pointer-events:auto; width:74px; height:74px; border-radius:50%; border:2px solid rgba(255,255,255,.5); background:rgba(255,255,255,.12); color:white; font-size:22px; font-weight:800; }
  </style>
</head>
<body>
<canvas id="game" width="960" height="540" aria-label="Contract Quest game canvas"></canvas>
<div id="hud"><span id="level">Level 1</span><span id="coins">Coins 0/6</span><span id="gems">Validation Gems 0</span><span id="boss">bossAlive: true</span></div>
<div id="panel">Contract Quest: collect clauses, validate Matrix Gates, defeat the Rogue Architect, and ship without runtime credentials. Keyboard: arrows/WASD + Space. Mobile buttons supported.</div>
<div id="touch"><span><button data-dir="left">◀</button><button data-dir="right">▶</button></span><button data-dir="jump">⤒</button></div>
<script>
(() => {
  'use strict';
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = 960, H = 540;
  const state = {
    levelIndex: 0,
    coins: 0,
    gems: 0,
    bossAlive: true,
    audioReady: false,
    jumpPressed: false,
    jumpHeld: false,
    dpr: Math.max(1, Math.min(2, window.devicePixelRatio || 1)),
    player: { x: 70, y: 380, vx: 0, vy: 0, w: 30, h: 42, grounded: false, alive: true },
    keys: Object.create(null),
    tick: 0
  };
  const levels = [
    { name: 'Offer Orchard', gate: 760, coins: [[170,350],[265,315],[365,360],[500,280],[635,330],[720,250]], gems: [[430,330]], enemies: [[590,390,0]], pit: [810,890] },
    { name: 'Clause Caverns', gate: 780, coins: [[160,330],[245,290],[355,250],[480,325],[590,285],[700,320]], gems: [[520,285]], enemies: [[300,390,1],[640,390,0]], pit: [95,150] },
    { name: 'Governance Gate', gate: 800, coins: [[130,330],[235,290],[360,260],[470,320],[585,285],[700,310]], gems: [[430,250],[660,255]], enemies: [[260,390,1],[560,390,1]], pit: [900,940] }
  ];
  const collected = new Set();
  let ac = null;
  function initAudio() { if (state.audioReady) return; ac = new (window.AudioContext || window.webkitAudioContext)(); state.audioReady = true; beep(330, .045); }
  function beep(freq, dur=.06) { if (!ac) return; const o=ac.createOscillator(), g=ac.createGain(); o.frequency.value=freq; o.type='triangle'; g.gain.value=.03; o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+dur); }
  function resize() { const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1)); state.dpr = dpr; canvas.width = Math.floor(innerWidth*dpr); canvas.height = Math.floor(innerHeight*dpr); }
  addEventListener('resize', resize); resize();
  function down(code){ initAudio(); state.keys[code]=true; if(code==='Space'||code==='ArrowUp'||code==='KeyW'){ state.jumpPressed=true; state.jumpHeld=true; }}
  function up(code){ state.keys[code]=false; if(code==='Space'||code==='ArrowUp'||code==='KeyW'){ state.jumpHeld=false; }}
  addEventListener('keydown', e => down(e.code)); addEventListener('keyup', e => up(e.code));
  document.querySelectorAll('#touch button').forEach(btn => { const dir=btn.dataset.dir; const map={left:'ArrowLeft',right:'ArrowRight',jump:'Space'}; btn.addEventListener('pointerdown', e=>{e.preventDefault(); down(map[dir]);}); btn.addEventListener('pointerup', e=>{e.preventDefault(); up(map[dir]);}); });
  function rect(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
  function resetPlayer(){ Object.assign(state.player,{x:70,y:380,vx:0,vy:0,grounded:false,alive:true}); }
  function nextLevel(){ state.levelIndex++; state.coins = 0; collected.clear(); resetPlayer(); if(state.levelIndex >= levels.length){ state.levelIndex = levels.length-1; state.bossAlive = false; beep(880,.12); } }
  function update(){
    const p=state.player, level=levels[state.levelIndex]; state.tick++;
    const left=state.keys.ArrowLeft||state.keys.KeyA, right=state.keys.ArrowRight||state.keys.KeyD;
    p.vx = (right-left)*4.1; if(state.jumpPressed && p.grounded){ p.vy=-12; p.grounded=false; beep(520,.04); } state.jumpPressed=false;
    if(!state.jumpHeld && p.vy < -3) p.vy=-3; p.vy += .55; p.x += p.vx; p.y += p.vy;
    if(p.y+p.h >= 430){ p.y=430-p.h; p.vy=0; p.grounded=true; }
    if(p.x < 0) p.x=0; if(p.x+p.w > W) p.x=W-p.w;
    if(p.x > level.pit[0] && p.x < level.pit[1] && p.y+p.h >= 428){ resetPlayer(); }
    level.coins.forEach((c,i)=>{ const id=`L${state.levelIndex}C${i}`; if(!collected.has(id) && rect(p,{x:c[0],y:c[1],w:22,h:22})){ collected.add(id); state.coins++; beep(700,.03); }});
    level.gems.forEach((g,i)=>{ const id=`L${state.levelIndex}G${i}`; if(!collected.has(id) && rect(p,{x:g[0],y:g[1],w:24,h:24})){ collected.add(id); state.gems++; beep(900,.04); }});
    level.enemies.forEach((e,i)=>{ const ex=e[0]+Math.sin(state.tick/45+i)*55, ey=e[1]; if(rect(p,{x:ex,y:ey,w:34,h:34})){ resetPlayer(); beep(150,.08); }});
    const atGate = p.x+p.w > level.gate && state.coins >= 6 && state.gems >= state.levelIndex+1;
    if(atGate){ if(state.levelIndex === levels.length-1 && state.bossAlive){ state.bossAlive=false; beep(180,.08); } else nextLevel(); }
    document.getElementById('level').textContent=`${level.name}`; document.getElementById('coins').textContent=`Coins ${state.coins}/6`; document.getElementById('gems').textContent=`Validation Gems ${state.gems}`; document.getElementById('boss').textContent=`bossAlive: ${state.bossAlive}`;
  }
  function draw(){
    const sx=canvas.width/W, sy=canvas.height/H; ctx.setTransform(sx,0,0,sy,0,0); ctx.clearRect(0,0,W,H);
    const grd=ctx.createLinearGradient(0,0,0,H); grd.addColorStop(0,'#162038'); grd.addColorStop(1,'#2a1d39'); ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#3f6f5a'; ctx.fillRect(0,430,W,110); ctx.fillStyle='#23344f'; for(let x=0;x<W;x+=64){ctx.fillRect(x,430,48,14)}
    const level=levels[state.levelIndex]; ctx.fillStyle='#0b1020'; ctx.fillRect(level.pit[0],430,level.pit[1]-level.pit[0],110);
    ctx.fillStyle='#ffd166'; level.coins.forEach((c,i)=>{ if(!collected.has(`L${state.levelIndex}C${i}`)){ ctx.beginPath(); ctx.arc(c[0]+11,c[1]+11,11,0,7); ctx.fill(); }});
    ctx.fillStyle='#7ee7ff'; level.gems.forEach((g,i)=>{ if(!collected.has(`L${state.levelIndex}G${i}`)){ ctx.fillRect(g[0],g[1],24,24); }});
    ctx.fillStyle=state.bossAlive&&state.levelIndex===2?'#d14d72':'#68d391'; ctx.fillRect(level.gate,330,52,100); ctx.fillStyle='#f8f4dd'; ctx.fillText('MATRIX GATE', level.gate-20, 318);
    level.enemies.forEach((e,i)=>{ ctx.fillStyle='#ff6b6b'; ctx.fillRect(e[0]+Math.sin(state.tick/45+i)*55,e[1],34,34); });
    const p=state.player; ctx.fillStyle='#f8f4dd'; ctx.fillRect(p.x,p.y,p.w,p.h); ctx.fillStyle='#415a77'; ctx.fillRect(p.x+5,p.y+8,20,16);
    ctx.fillStyle='rgba(255,255,255,.82)'; ctx.font='18px system-ui'; ctx.fillText('RMD Panels • Contract Coins • Validation Gems • Lazy WebAudio', 28, 40);
  }
  function loop(){ update(); draw(); requestAnimationFrame(loop); } loop();
  window.__CONTRACT_QUEST_DEBUG__ = state;
})();
</script>
</body>
</html>
